<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeWave Eval Dashboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #08091a;
      color: #e2e8f0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0f0f23;
    }

    ::-webkit-scrollbar-thumb {
      background: #2d2d4e;
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const {
      RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
      BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
      LineChart, Line, CartesianGrid, Legend, Cell
    } = Recharts;
    const { useState } = React;

    // ─── DATA ─────────────────────────────────────────────────────────────────────
    const round1Queries = [
      { id: 1, category: "Mood", query: "songs for a rainy Sunday morning", time: 61.05, success: true, relevance: 5, mood: 5, diversity: 10, satisfaction: 60, research: 0 },
      { id: 2, category: "Mood", query: "music that feels like driving at 3am", time: 58.21, success: true, relevance: 5, mood: 5, diversity: 10, satisfaction: 50, research: 0 },
      { id: 3, category: "Mood", query: "music for the last 10 min before big presentation", time: null, success: false, relevance: null, mood: null, diversity: null, satisfaction: null, research: null },
      { id: 4, category: "Style", query: "dark academia playlist", time: 50.44, success: true, relevance: 5, mood: 5, diversity: 10, satisfaction: 70, research: 0 },
      { id: 5, category: "Style", query: "French café jazz", time: 52.81, success: true, relevance: 4, mood: 3, diversity: 10, satisfaction: 30, research: 2 },
      { id: 6, category: "Style", query: "hyperpop but make it chill", time: 55.35, success: true, relevance: 5, mood: 5, diversity: 9, satisfaction: 60, research: 0 },
      { id: 7, category: "Similar", query: "more like Cruel Summer but darker", time: 58.29, success: true, relevance: 5, mood: 5, diversity: 9, satisfaction: 80, research: 0 },
      { id: 8, category: "Similar", query: "songs like good luck babe by chappell roan", time: 65.19, success: true, relevance: 4, mood: 4, diversity: 8, satisfaction: 80, research: 0 },
      { id: 9, category: "Multi-lang", query: "Energetic morning run songs [CN]", time: 65.16, success: true, relevance: 5, mood: 5, diversity: 10, satisfaction: 100, research: 0 },
      { id: 10, category: "Multi-lang", query: "Songs like Gurenge (hype up) [JP]", time: 70.65, success: true, relevance: 4, mood: 5, diversity: 9, satisfaction: 80, research: 0 },
      { id: 11, category: "Edge", query: "idk just something good", time: 58.22, success: true, relevance: 5, mood: 5, diversity: 10, satisfaction: 80, research: 1 },
      { id: 12, category: "Edge", query: "Recommend something with taste [CN]", time: 60.43, success: true, relevance: 5, mood: 5, diversity: 8, satisfaction: 100, research: 0 },
      { id: 13, category: "Edge", query: "Non-mainstream indie for café reading [CN]", time: 64.02, success: true, relevance: 5, mood: 5, diversity: 10, satisfaction: 90, research: 0 },
    ];

    const abData = [
      { label: "1-A", query: "French café jazz", time: 39.2, relevance: 5, mood: 4, diversity: 9, satisfaction: 23, research: 1 },
      { label: "1-B", query: "French café jazz", time: 41.1, relevance: 5, mood: 5, diversity: 10, satisfaction: 57, research: 0 },
      { label: "2-A", query: "Solo train journey songs [CN]", time: 47.6, relevance: 5, mood: 5, diversity: 10, satisfaction: 50, research: 0 },
      { label: "2-B", query: "Solo train journey songs [CN]", time: 48.0, relevance: 5, mood: 5, diversity: 10, satisfaction: 60, research: 0 },
    ];

    const radarNorm = [
      { metric: "Relevance", value: 95 },
      { metric: "Mood Fit", value: 95 },
      { metric: "Diversity", value: 94 },
      { metric: "Satisfaction", value: 73 },
    ];

    const catColors = { "Mood": "#a78bfa", "Style": "#34d399", "Similar": "#f472b6", "Multi-lang": "#fb923c", "Edge": "#38bdf8" };

    // ─── SMALL COMPONENTS ─────────────────────────────────────────────────────────
    const Tip = ({ active, payload, label }) => {
      if (!active || !payload || !payload.length) return null;
      return (
        <div style={{ background: "#1a1a2e", border: "1px solid #7c3aed44", borderRadius: 8, padding: "8px 14px", fontSize: 12 }}>
          <div style={{ color: "#a78bfa", fontWeight: 700, marginBottom: 4 }}>{label}</div>
          {payload.map(p => <div key={p.name} style={{ color: p.color || "#e2e8f0" }}>{p.name}: <b>{p.value}</b></div>)}
        </div>
      );
    };

    const Gauge = ({ value, max, label, unit = "", color, size = 110 }) => {
      const pct = value / max;
      const r = (size - 16) / 2;
      const circ = 2 * Math.PI * r;
      const dash = circ * 0.75;
      const filled = dash * pct;
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <svg width={size} height={size * 0.85} style={{ overflow: "visible" }}>
            <g transform={`rotate(-225 ${size / 2} ${size / 2})`}>
              <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#1e1e35" strokeWidth={8} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" />
              <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={8}
                strokeDasharray={`${filled} ${circ - filled}`} strokeLinecap="round"
                style={{ filter: `drop-shadow(0 0 6px ${color})` }} />
            </g>
            <text x={size / 2} y={size / 2 + 4} textAnchor="middle" fill="white" fontSize={size * 0.17} fontWeight={700} fontFamily="DM Mono, monospace">
              {typeof value === "number" && value % 1 !== 0 ? value.toFixed(1) : value}{unit}
            </text>
          </svg>
          <span style={{ fontSize: 11, color: "#94a3b8", textAlign: "center", maxWidth: size }}>{label}</span>
        </div>
      );
    };

    const KpiCard = ({ title, value, sub, color, icon, pass }) => (
      <div style={{
        background: "linear-gradient(135deg,#1a1a2e 60%,#16213e)", border: `1px solid ${color}33`, borderRadius: 12,
        padding: "16px 20px", position: "relative", overflow: "hidden", flex: 1, minWidth: 140
      }}>
        <div style={{ position: "absolute", top: 0, right: 0, width: 60, height: 60, background: `radial-gradient(circle at top right,${color}22,transparent)` }} />
        <div style={{ fontSize: 22, marginBottom: 6 }}>{icon}</div>
        <div style={{ fontSize: 26, fontWeight: 800, color, fontFamily: "DM Mono, monospace", textShadow: `0 0 20px ${color}88` }}>{value}</div>
        <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>{title}</div>
        {sub && <div style={{ fontSize: 11, color: pass ? "#4ade80" : "#f87171", marginTop: 4 }}>{sub}</div>}
      </div>
    );

    const Dot = ({ val, max }) => {
      const pct = val === null ? 0 : val / max;
      const c = pct >= 0.9 ? "#4ade80" : pct >= 0.7 ? "#facc15" : "#f87171";
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: val === null ? "#374151" : c, boxShadow: val !== null ? `0 0 6px ${c}` : "none" }} />
          <span style={{ fontSize: 12, color: val === null ? "#4b5563" : "white", fontFamily: "DM Mono, monospace" }}>{val === null ? "—" : val}</span>
        </div>
      );
    };

    // ─── MAIN APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("overview");
      const ok = round1Queries.filter(q => q.success);
      const avgTime = ok.reduce((s, q) => s + q.time, 0) / ok.length;

      const tabSt = (t) => ({
        padding: "8px 20px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
        transition: "all 0.2s",
        background: tab === t ? "linear-gradient(135deg,#7c3aed,#a855f7)" : "transparent",
        color: tab === t ? "white" : "#64748b",
        border: tab === t ? "none" : "1px solid #1e293b",
        letterSpacing: "0.02em",
      });

      const experiments = [
        {
          exp: "Experiment 1", title: "Era Freshness — French Café Jazz",
          a: { label: "Control (A)", desc: "No date filter" },
          b: { label: "Treatment (B)", desc: 'Added "prioritize post-2010"' },
          groups: [abData[0], abData[1]],
          color: "#a78bfa",
          insight: "Mood Fit jumped 4.0 → 5.0. Satisfaction nearly tripled (23% → 57%). Zero re-searches vs 3 in control.",
        },
        {
          exp: "Experiment 2", title: "Language Localisation — 'Solo Train Journey' Query",
          a: { label: "Control (A)", desc: "English-only output" },
          b: { label: "Treatment (B)", desc: "With language instruction" },
          groups: [abData[2], abData[3]],
          color: "#f472b6",
          insight: "30–60% local-language songs introduced. Satisfaction +10pp (50% → 60%). Core quality metrics unchanged.",
        },
      ];

      return (
        <div style={{ minHeight: "100vh", background: "#08091a", color: "#e2e8f0", paddingBottom: 60 }}>

          {/* HEADER */}
          <div style={{
            background: "linear-gradient(180deg,#0f0f23,#08091a)", borderBottom: "1px solid #1e1e35",
            padding: "32px 40px 24px", position: "relative", overflow: "hidden"
          }}>
            <div style={{ position: "absolute", top: -40, left: "30%", width: 300, height: 300, background: "radial-gradient(circle,#7c3aed22,transparent)", pointerEvents: "none" }} />
            <div style={{ position: "absolute", top: -20, right: "15%", width: 200, height: 200, background: "radial-gradient(circle,#ec489922,transparent)", pointerEvents: "none" }} />

            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 16, position: "relative" }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                  <div style={{
                    width: 36, height: 36, borderRadius: 10, background: "linear-gradient(135deg,#7c3aed,#ec4899)",
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, boxShadow: "0 0 20px #7c3aed66"
                  }}>🎵</div>
                  <span style={{
                    fontFamily: "Syne, sans-serif", fontSize: 26, fontWeight: 800,
                    background: "linear-gradient(135deg,#a78bfa,#f472b6)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
                  }}>
                    VibeWave
                  </span>
                  <span style={{ fontSize: 12, padding: "3px 10px", borderRadius: 20, background: "#7c3aed22", border: "1px solid #7c3aed55", color: "#a78bfa" }}>
                    Eval Report v1.0
                  </span>
                </div>
                <div style={{ color: "#64748b", fontSize: 13 }}>Agentic Music Discovery with AI · n8n + LLM + Spotify API · 3-Layer Evaluation Framework</div>
              </div>
              <div style={{ display: "flex", gap: 20, fontSize: 12, color: "#475569" }}>
                <div>Round 1 <span style={{ color: "#a78bfa", fontWeight: 700 }}>13 queries</span></div>
                <div>A/B Test <span style={{ color: "#f472b6", fontWeight: 700 }}>4 groups</span></div>
                <div>Round 2 <span style={{ color: "#34d399", fontWeight: 700 }}>optimized</span></div>
              </div>
            </div>

            <div style={{ display: "flex", gap: 8, marginTop: 24, flexWrap: "wrap" }}>
              {[["overview", "Overview"], ["queries", "Query Breakdown"], ["ab", "A/B Testing"], ["layer2", "Layer 2 Detail"]].map(([t, l]) => (
                <button key={t} style={tabSt(t)} onClick={() => setTab(t)}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{ padding: "32px 40px", maxWidth: 1200, margin: "0 auto" }}>

            {/* ── OVERVIEW ── */}
            {tab === "overview" && (
              <div>
                {/* layer headers */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20, marginBottom: 28 }}>
                  {[
                    { label: "Layer 1 · System Quality SLA", color: "#38bdf8", desc: "Response Time · Success Rate" },
                    { label: "Layer 2 · Recommendation Quality", color: "#a78bfa", desc: "Relevance · Mood Fit · Diversity" },
                    { label: "Layer 3 · User Behavior", color: "#f472b6", desc: "Satisfaction Rate · Re-search Rate" },
                  ].map(l => (
                    <div key={l.label} style={{ borderTop: `2px solid ${l.color}`, paddingTop: 10 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: l.color }}>{l.label}</div>
                      <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{l.desc}</div>
                    </div>
                  ))}
                </div>

                {/* KPI cards */}
                <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 28 }}>
                  <KpiCard title="Avg Response Time" value={`${avgTime.toFixed(1)}s`} sub="⚠ Target: <60s" color="#38bdf8" icon="⚡" pass={false} />
                  <KpiCard title="Success Rate" value="91.7%" sub="11 / 12 · ✓ Near target" color="#4ade80" icon="✅" pass={true} />
                  <KpiCard title="Avg Relevance" value="4.75" sub="out of 5.0 · ✓ Excellent" color="#a78bfa" icon="🎯" pass={true} />
                  <KpiCard title="Avg Mood Fit" value="4.75" sub="out of 5.0 · ✓ Excellent" color="#f472b6" icon="💜" pass={true} />
                  <KpiCard title="Avg Diversity" value="9.42" sub="out of 10 · ✓ Target ≥8" color="#fb923c" icon="🎨" pass={true} />
                  <KpiCard title="Avg Satisfaction" value="73.3%" sub="✓ Target: >60%" color="#34d399" icon="⭐" pass={true} />
                </div>

                {/* Radar + Bar */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1.4fr", gap: 24, marginBottom: 24 }}>
                  <div style={{ background: "#0f0f23", border: "1px solid #1e1e35", borderRadius: 16, padding: 24 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#a78bfa", marginBottom: 4 }}>Quality Radar</div>
                    <div style={{ fontSize: 11, color: "#475569", marginBottom: 16 }}>Normalized 0–100 across all metrics</div>
                    <ResponsiveContainer width="100%" height={240}>
                      <RadarChart data={radarNorm} outerRadius="62%" margin={{ top: 24, right: 48, bottom: 24, left: 48 }}>
                        <PolarGrid stroke="#1e1e35" />
                        <PolarAngleAxis dataKey="metric" tick={{ fill: "#94a3b8", fontSize: 11 }} />
                        <PolarRadiusAxis angle={30} domain={[0, 100]} tick={false} axisLine={false} />
                        <Radar name="Score" dataKey="value" stroke="#a78bfa" fill="#a78bfa" fillOpacity={0.25}
                          dot={{ fill: "#a78bfa", strokeWidth: 0, r: 4 }} />
                      </RadarChart>
                    </ResponsiveContainer>
                  </div>

                  <div style={{ background: "#0f0f23", border: "1px solid #1e1e35", borderRadius: 16, padding: 24 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#38bdf8", marginBottom: 4 }}>Response Time per Query</div>
                    <div style={{ fontSize: 11, color: "#475569", marginBottom: 16 }}>Bars in red exceeded the 60s SLA target · 6 / 12 queries</div>
                    <ResponsiveContainer width="100%" height={240}>
                      <BarChart data={ok.map(q => ({ name: q.query.length > 22 ? q.query.slice(0, 22) + "…" : q.query, time: q.time, over: q.time > 60 }))}
                        margin={{ top: 5, right: 10, bottom: 40, left: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#1e1e35" />
                        <XAxis dataKey="name" tick={{ fill: "#475569", fontSize: 8 }} angle={-30} textAnchor="end" interval={0} />
                        <YAxis tick={{ fill: "#475569", fontSize: 10 }} domain={[0, 80]} />
                        <Tooltip content={<Tip />} />
                        <Bar dataKey="time" name="Time (s)" radius={[4, 4, 0, 0]}>
                          {ok.map((q, i) => <Cell key={i} fill={q.time > 60 ? "#f87171" : "#38bdf8"} />)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                {/* Gauges */}
                <div style={{ background: "#0f0f23", border: "1px solid #1e1e35", borderRadius: 16, padding: 24 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 20 }}>Layer 2 Metric Gauges — Round 1 Averages</div>
                  <div style={{ display: "flex", justifyContent: "space-around", flexWrap: "wrap", gap: 20 }}>
                    <Gauge value={4.75} max={5} label="Relevance" unit="/5" color="#a78bfa" />
                    <Gauge value={4.75} max={5} label="Mood Fit" unit="/5" color="#f472b6" />
                    <Gauge value={9.42} max={10} label="Diversity" unit="/10" color="#fb923c" />
                    <Gauge value={73} max={100} label="Satisfaction" unit="%" color="#34d399" />
                    <Gauge value={91.7} max={100} label="Success Rate" unit="%" color="#38bdf8" />
                  </div>
                </div>
              </div>
            )}

            {/* ── QUERY BREAKDOWN ── */}
            {tab === "queries" && (
              <div>
                <div style={{ marginBottom: 20 }}>
                  <span style={{ fontSize: 16, fontWeight: 700 }}>Round 1 · All Query Results</span>
                  <span style={{ fontSize: 12, color: "#475569", marginLeft: 12 }}>13 queries across 5 categories</span>
                </div>

                <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
                  {Object.entries(catColors).map(([cat, col]) => (
                    <div key={cat} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#94a3b8" }}>
                      <div style={{ width: 10, height: 10, borderRadius: 2, background: col }} />{cat}
                    </div>
                  ))}
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <div style={{
                    display: "grid", gridTemplateColumns: "24px 100px 1fr 80px 56px 64px 64px 72px 80px 80px",
                    gap: 8, padding: "8px 16px", fontSize: 10, color: "#475569", fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase"
                  }}>
                    <div>#</div><div>Category</div><div>Query</div><div>Time</div>
                    <div>OK</div><div>Relev.</div><div>Mood</div><div>Divers.</div><div>Satisf.</div><div>Re-search</div>
                  </div>
                  {round1Queries.map(q => (
                    <div key={q.id} style={{
                      display: "grid", gridTemplateColumns: "24px 100px 1fr 80px 56px 64px 64px 72px 80px 80px",
                      gap: 8, padding: "12px 16px", borderRadius: 10, alignItems: "center",
                      background: q.success ? "#0f0f23" : "#1a0a0a",
                      border: `1px solid ${q.success ? "#1e1e35" : "#7f1d1d44"}`
                    }}>
                      <div style={{ fontSize: 12, color: "#475569", fontFamily: "DM Mono, monospace" }}>{q.id}</div>
                      <div><span style={{
                        fontSize: 10, padding: "2px 8px", borderRadius: 8, fontWeight: 600,
                        background: `${catColors[q.category]}22`, color: catColors[q.category]
                      }}>{q.category}</span></div>
                      <div style={{ fontSize: 12, color: q.success ? "#cbd5e1" : "#6b7280" }}>{q.query}</div>
                      <div style={{
                        fontSize: 12, fontFamily: "DM Mono, monospace",
                        color: q.time === null ? "#4b5563" : q.time > 60 ? "#fca5a5" : "#67e8f9"
                      }}>
                        {q.time === null ? "—" : `${q.time}s`}</div>
                      <div style={{ fontSize: 15 }}>{q.success ? "✅" : "❌"}</div>
                      <Dot val={q.relevance} max={5} />
                      <Dot val={q.mood} max={5} />
                      <Dot val={q.diversity} max={10} />
                      <div style={{
                        fontSize: 12, fontFamily: "DM Mono, monospace",
                        color: q.satisfaction === null ? "#4b5563" : q.satisfaction >= 60 ? "#4ade80" : "#f87171"
                      }}>
                        {q.satisfaction === null ? "—" : `${q.satisfaction}%`}</div>
                      <div style={{
                        fontSize: 12, fontFamily: "DM Mono, monospace",
                        color: q.research === null ? "#4b5563" : q.research === 0 ? "#4ade80" : "#fbbf24"
                      }}>
                        {q.research === null ? "—" : q.research === 0 ? "0 ✓" : `${q.research}×`}</div>
                    </div>
                  ))}
                </div>

                {/* Round 2 panel */}
                <div style={{ marginTop: 28, background: "#0f2318", border: "1px solid #166534", borderRadius: 12, padding: 20 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#4ade80", marginBottom: 10 }}>🔄 Round 2 Optimizations Applied</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {[
                      {
                        issue: "Japanese query auto-triggered language localisation; Chinese queries did not",
                        fix: 'Added: "If query is in a non-English language, include songs in that language"',
                        result: "Mandarin folk tracks auto-appeared (Faye Wong, Mi Dian)"
                      },
                      {
                        issue: "Recommendations skewed toward older eras, users found them dated",
                        fix: 'System Prompt: "prioritize post-2010 unless specified"',
                        result: "French café jazz satisfaction rate: 30% → 67%"
                      },
                      {
                        issue: "Vague queries occasionally returned duplicate tracks on re-search",
                        fix: '"Mix 60% well-known + 40% hidden gems"',
                        result: "idk query: freshness↑, re-search rate dropped to 0"
                      },
                    ].map((opt, i) => (
                      <div key={i} style={{
                        display: "grid", gridTemplateColumns: "1fr 1.2fr 1fr", gap: 12, fontSize: 12,
                        background: "#0a1f14", borderRadius: 8, padding: "10px 14px"
                      }}>
                        <div style={{ color: "#fca5a5" }}>⚠ {opt.issue}</div>
                        <div style={{ color: "#93c5fd" }}>→ {opt.fix}</div>
                        <div style={{ color: "#86efac" }}>✓ {opt.result}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ── A/B TESTING ── */}
            {tab === "ab" && (
              <div>
                <div style={{ marginBottom: 24 }}>
                  <span style={{ fontSize: 16, fontWeight: 700 }}>A/B Testing Results</span>
                  <span style={{ fontSize: 12, color: "#475569", marginLeft: 12 }}>2 experiments · 3 runs each · Prompt engineering validation</span>
                </div>

                {experiments.map((exp, ei) => (
                  <div key={ei} style={{ marginBottom: 32 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                      <div style={{ fontSize: 11, padding: "3px 10px", background: "#1e1e35", borderRadius: 20, color: "#64748b" }}>{exp.exp}</div>
                      <div style={{ fontSize: 15, fontWeight: 700 }}>{exp.title}</div>
                    </div>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 16 }}>
                      {exp.groups.map((g, gi) => (
                        <div key={gi} style={{
                          background: "#0f0f23", borderRadius: 14, padding: 20,
                          border: `1px solid ${gi === 0 ? "#334155" : exp.color + "55"}`
                        }}>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
                            <div>
                              <span style={{ fontSize: 14, fontWeight: 700, color: gi === 0 ? "#94a3b8" : exp.color }}>
                                {gi === 0 ? exp.a.label : exp.b.label}
                              </span>
                              <div style={{ fontSize: 11, color: "#475569", marginTop: 2 }}>{gi === 0 ? exp.a.desc : exp.b.desc}</div>
                            </div>
                            <span style={{ fontSize: 20 }}>{gi === 0 ? "🔬" : "⚗️"}</span>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                            {[
                              { label: "Avg Response", val: `${g.time.toFixed(1)}s`, ok: g.time < 60 },
                              { label: "Relevance", val: `${g.relevance}/5`, ok: g.relevance >= 4 },
                              { label: "Mood Fit", val: `${g.mood}/5`, ok: g.mood >= 4 },
                              { label: "Diversity", val: `${g.diversity}/10`, ok: g.diversity >= 8 },
                              { label: "Satisfaction", val: `${g.satisfaction}%`, ok: g.satisfaction >= 60 },
                              { label: "Re-search", val: g.research === 0 ? "0 ✓" : `${g.research}×`, ok: g.research === 0 },
                            ].map(m => (
                              <div key={m.label} style={{ background: "#0a0a18", borderRadius: 8, padding: "10px 12px" }}>
                                <div style={{ fontSize: 10, color: "#475569", marginBottom: 4 }}>{m.label}</div>
                                <div style={{
                                  fontSize: 16, fontWeight: 700, fontFamily: "DM Mono, monospace",
                                  color: m.ok ? "#4ade80" : "#f87171"
                                }}>{m.val}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>

                    <div style={{ background: "#0f0f23", border: "1px solid #1e1e35", borderRadius: 14, padding: 20 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#94a3b8", marginBottom: 12 }}>A vs B Comparison</div>
                      <ResponsiveContainer width="100%" height={160}>
                        <BarChart data={[
                          { metric: "Mood Fit (/5)", A: exp.groups[0].mood, B: exp.groups[1].mood },
                          { metric: "Diversity (/10)", A: exp.groups[0].diversity, B: exp.groups[1].diversity },
                          { metric: "Satisf. (÷10)", A: exp.groups[0].satisfaction / 10, B: exp.groups[1].satisfaction / 10 },
                          { metric: "Re-search (inv)", A: 3 - exp.groups[0].research, B: 3 - exp.groups[1].research },
                        ]} margin={{ top: 5, right: 20, bottom: 5, left: 0 }}>
                          <CartesianGrid strokeDasharray="3 3" stroke="#1e1e35" />
                          <XAxis dataKey="metric" tick={{ fill: "#64748b", fontSize: 10 }} />
                          <YAxis tick={{ fill: "#64748b", fontSize: 10 }} />
                          <Tooltip content={<Tip />} />
                          <Legend wrapperStyle={{ fontSize: 11, color: "#94a3b8" }} />
                          <Bar dataKey="A" name="A (Control)" fill="#334155" radius={[3, 3, 0, 0]} />
                          <Bar dataKey="B" name="B (Treatment)" fill={exp.color} radius={[3, 3, 0, 0]} />
                        </BarChart>
                      </ResponsiveContainer>
                      <div style={{
                        marginTop: 14, padding: "10px 14px", background: "#0a1520", borderRadius: 8,
                        borderLeft: `3px solid ${exp.color}`, fontSize: 12, color: "#94a3b8", lineHeight: 1.6
                      }}>
                        💡 {exp.insight}
                      </div>
                    </div>
                  </div>
                ))}

                <div style={{ background: "linear-gradient(135deg,#0f1f0a,#0a1520)", border: "1px solid #166534", borderRadius: 14, padding: 24 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#4ade80", marginBottom: 14 }}>
                    📊 A/B Test Conclusions — Recommendation: Ship Both Prompts
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
                    {[
                      { n: "1", title: "Prompt effects are stable", desc: "Both B groups showed consistent improvements across 3 runs — not noise." },
                      { n: "2", title: "Core quality unharmed", desc: "Relevance & Mood Fit held at 5.0 in both B groups — no quality regression." },
                      { n: "3", title: "User behavior metrics win", desc: "Satisfaction up, re-search down. B groups solve the top user pain points." },
                    ].map(c => (
                      <div key={c.n} style={{ background: "#0a1f14", borderRadius: 10, padding: 16 }}>
                        <div style={{ fontSize: 22, color: "#4ade80", fontFamily: "Syne, sans-serif", fontWeight: 800 }}>{c.n}</div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#86efac", marginBottom: 6 }}>{c.title}</div>
                        <div style={{ fontSize: 11, color: "#4b7c5e", lineHeight: 1.5 }}>{c.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ── LAYER 2 DETAIL ── */}
            {tab === "layer2" && (
              <div>
                <div style={{ marginBottom: 24 }}>
                  <span style={{ fontSize: 16, fontWeight: 700 }}>Layer 2 — Recommendation Quality Deep Dive</span>
                  <span style={{ fontSize: 12, color: "#475569", marginLeft: 12 }}>Relevance · Mood Fit · Diversity per query</span>
                </div>

                <div style={{ background: "#0f0f23", border: "1px solid #1e1e35", borderRadius: 16, padding: 24, marginBottom: 24 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#a78bfa", marginBottom: 16 }}>
                    Scores per Successful Query (Relevance /5 · Mood Fit /5 · Diversity ÷2)
                  </div>
                  <ResponsiveContainer width="100%" height={300}>
                    <BarChart data={ok.map(q => ({
                      name: q.query.length > 18 ? q.query.slice(0, 18) + "…" : q.query,
                      Relevance: q.relevance, MoodFit: q.mood, Diversity: q.diversity / 2
                    }))} margin={{ top: 10, right: 20, bottom: 60, left: 0 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#1e1e35" />
                      <XAxis dataKey="name" tick={{ fill: "#475569", fontSize: 8 }} angle={-35} textAnchor="end" interval={0} />
                      <YAxis tick={{ fill: "#475569", fontSize: 10 }} domain={[0, 5]} />
                      <Tooltip content={<Tip />} />
                      <Legend wrapperStyle={{ fontSize: 11, color: "#94a3b8", paddingTop: 10 }} />
                      <Bar dataKey="Relevance" fill="#a78bfa" radius={[0, 0, 0, 0]} />
                      <Bar dataKey="MoodFit" name="Mood Fit" fill="#f472b6" radius={[0, 0, 0, 0]} />
                      <Bar dataKey="Diversity" name="Diversity (÷2)" fill="#fb923c" radius={[3, 3, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                  <div style={{ fontSize: 10, color: "#374151", marginTop: 8, textAlign: "right" }}>
                    * Diversity divided by 2 to normalize to /5 scale for visual alignment
                  </div>
                </div>

                <div style={{ background: "#0f0f23", border: "1px solid #1e1e35", borderRadius: 16, padding: 24 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#34d399", marginBottom: 16 }}>
                    Satisfaction Rate per Query — Target: &gt;60% (dashed line)
                  </div>
                  <ResponsiveContainer width="100%" height={220}>
                    <LineChart data={ok.map(q => ({
                      name: q.query.length > 18 ? q.query.slice(0, 18) + "…" : q.query,
                      satisfaction: q.satisfaction, target: 60
                    }))} margin={{ top: 5, right: 20, bottom: 50, left: 0 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#1e1e35" />
                      <XAxis dataKey="name" tick={{ fill: "#475569", fontSize: 8 }} angle={-35} textAnchor="end" interval={0} />
                      <YAxis tick={{ fill: "#475569", fontSize: 10 }} domain={[0, 110]} />
                      <Tooltip content={<Tip />} />
                      <Legend wrapperStyle={{ fontSize: 11, color: "#94a3b8" }} />
                      <Line type="monotone" dataKey="satisfaction" name="Satisfaction %" stroke="#34d399" strokeWidth={2}
                        dot={{ fill: "#34d399", r: 4 }} activeDot={{ r: 6 }} />
                      <Line type="monotone" dataKey="target" name="Target (60%)" stroke="#4ade8066" strokeWidth={1.5}
                        strokeDasharray="5 5" dot={false} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            )}

          </div>

          <div style={{ textAlign: "center", padding: "20px 40px", borderTop: "1px solid #0f0f1f", fontSize: 11, color: "#1e293b" }}>
            VibeWave Eval Dashboard · Built by R_X · AI Native
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
